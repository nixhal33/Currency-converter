version: '3.8'

services:
  currency-converter:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: currency-conv-app
    ports:
      - "82:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
